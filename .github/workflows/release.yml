name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            artifact: arb-darwin-arm64
            os: macos-latest
          - target: bun-darwin-x64
            artifact: arb-darwin-x64
            os: macos-latest
          - target: bun-linux-arm64
            artifact: arb-linux-arm64
            os: ubuntu-latest
          - target: bun-linux-x64
            artifact: arb-linux-x64
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun scripts/version.ts

      - name: Build binary
        run: |
          bun build src/index.ts --compile --target=${{ matrix.target }} --outfile=dist/${{ matrix.artifact }}

      - name: Generate checksum
        run: |
          cd dist
          shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/arb-*

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun scripts/version.ts

      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}

  update-homebrew:
    needs: [build, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Read checksums
        id: checksums
        run: |
          echo "darwin_arm64=$(awk '{print $1}' artifacts/arb-darwin-arm64.sha256)" >> "$GITHUB_OUTPUT"
          echo "darwin_x64=$(awk '{print $1}' artifacts/arb-darwin-x64.sha256)" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(awk '{print $1}' artifacts/arb-linux-arm64.sha256)" >> "$GITHUB_OUTPUT"
          echo "linux_x64=$(awk '{print $1}' artifacts/arb-linux-x64.sha256)" >> "$GITHUB_OUTPUT"

      - name: Generate formula
        run: |
          bun scripts/update-formula.ts \
            ${{ steps.version.outputs.version }} \
            ${{ steps.checksums.outputs.darwin_arm64 }} \
            ${{ steps.checksums.outputs.darwin_x64 }} \
            ${{ steps.checksums.outputs.linux_arm64 }} \
            ${{ steps.checksums.outputs.linux_x64 }} \
            > arb.rb

      - name: Push to Homebrew tap
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        with:
          source_file: arb.rb
          destination_repo: rspencerfink/homebrew-git-arborist
          destination_folder: Formula
          user_email: github-actions[bot]@users.noreply.github.com
          user_name: github-actions[bot]
          commit_message: "Update arb to ${{ steps.version.outputs.version }}"
